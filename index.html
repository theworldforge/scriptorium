// DRIVE STATE (module-level)
// ══════════════════════════════════════════════════════════════════════════
let driveToken=null,driveFolderId=null,driveFolderName=null,driveFileId=null,autoSaveTimer=null;
(function loadMeta(){
  try{const m=JSON.parse(localStorage.getItem(DRIVE_META_KEY)||"null");if(m){driveFolderId=m.folderId;driveFolderName=m.folderName;driveFileId=m.fileId||null;}}catch{}
})();
function persistMeta(ts){localStorage.setItem(DRIVE_META_KEY,JSON.stringify({folderId:driveFolderId,folderName:driveFolderName,fileId:driveFileId,lastSave:ts}));}
function getLastSave(){try{const m=JSON.parse(localStorage.getItem(DRIVE_META_KEY)||"null");return m?.lastSave?new Date(m.lastSave).toLocaleString():"never";}catch{return"never";}}

async function driveSave(silent,setStatus,getData){
  if(!driveToken||!driveFolderId){if(!silent&&setStatus)setStatus("error");return;}
  if(setStatus)setStatus("saving");
  try{
    const payload=JSON.stringify(getData(),null,2);
    const blob=new Blob([payload],{type:"application/json"});
    let fid=driveFileId;
    if(!fid){
      const q=`name='${DRIVE_FILE_NAME}' and '${driveFolderId}' in parents and trashed=false`;
      const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`,{headers:{Authorization:"Bearer "+driveToken}});
      const d=await r.json();if(d.files&&d.files.length)fid=d.files[0].id;
    }
    const url=fid?`https://www.googleapis.com/upload/drive/v3/files/${fid}?uploadType=multipart`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
    const method=fid?"PATCH":"POST";
    const meta=new Blob([JSON.stringify(fid?{}:{name:DRIVE_FILE_NAME,parents:[driveFolderId]})],{type:"application/json"});
    const form=new FormData();form.append("metadata",meta);form.append("file",blob);
    const r2=await fetch(url,{method,headers:{Authorization:"Bearer "+driveToken},body:form});
    const d2=await r2.json();driveFileId=d2.id||fid;persistMeta(new Date().toISOString());
    if(setStatus)setStatus("saved");
  }catch(e){console.error(e);if(setStatus)setStatus("error");}
}
function schedAutoSave(getData,setStatus){
  if(!driveToken||!driveFolderId)return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(()=>driveSave(true,setStatus,getData),8000);
}

// DRIVE MODAL
// ══════════════════════════════════════════════════════════════════════════
function DriveModal({t,onClose,setStatus,getData,setData}){
  const [log,setLog]=useState("");
  const [fname,setFname]=useState(driveFolderName||"");
  const [authed,setAuthed]=useState(!!driveToken);

  function doAuth(){
    function init(){
      const tc=window.google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID,scope:SCOPES,
        callback:(resp)=>{
          if(resp.error){setLog("Auth error: "+resp.error);return;}
          driveToken=resp.access_token;setAuthed(true);setStatus("connected");
          setLog("Connected! Now choose a folder to save into.");
        }
      });tc.requestAccessToken();
    }
    if(!window.google){const s=document.createElement("script");s.src="https://accounts.google.com/gsi/client";s.onload=init;document.head.appendChild(s);}
    else init();
  }

  function doPickFolder(){
    if(!driveToken){setLog("Connect first.");return;}
    function openPicker(){
      new window.google.picker.PickerBuilder()
        .addView(new window.google.picker.DocsView(window.google.picker.ViewId.FOLDERS).setSelectFolderEnabled(true).setMimeTypes("application/vnd.google-apps.folder"))
        .setOAuthToken(driveToken)
        .setCallback(data=>{
          if(data.action===window.google.picker.Action.PICKED){
            const f=data.docs[0];driveFolderId=f.id;driveFolderName=f.name;driveFileId=null;
            setFname(f.name);setLog("Folder selected: "+f.name+". Saving now…");
            driveSave(false,setStatus,getData).then(()=>setLog("Saved to Drive."));
          }
        }).build().setVisible(true);
    }
    if(!window.gapi){const s=document.createElement("script");s.src="https://apis.google.com/js/api.js";s.onload=()=>window.gapi.load("picker",openPicker);document.head.appendChild(s);}
    else window.gapi.load("picker",openPicker);
  }

  async function doLoad(){
    if(!driveToken){setLog("Connect first.");return;}
    setLog("Loading from Drive…");
    try{
      let fid=driveFileId;
      if(!fid&&driveFolderId){
        const q=`name='${DRIVE_FILE_NAME}' and '${driveFolderId}' in parents and trashed=false`;
        const r=await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id)`,{headers:{Authorization:"Bearer "+driveToken}});
        const d=await r.json();if(d.files&&d.files.length)fid=d.files[0].id;
      }
      if(!fid){setLog("No backup found in that folder.");return;}
      const r2=await fetch(`https://www.googleapis.com/drive/v3/files/${fid}?alt=media`,{headers:{Authorization:"Bearer "+driveToken}});
      const data=await r2.json();driveFileId=fid;setData(data);setLog("Loaded from Drive successfully.");setStatus("saved");
    }catch(e){setLog("Load error: "+e.message);}
  }

  return(
    <Modal t={t} title="Google Drive Sync" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{fontSize:13,color:t.textFaint}}>Saves your entire project to Drive as <em>scriptorium-backup.json</em>. Auto-saves 8 seconds after you stop writing.</div>
        {fname&&<div style={{fontSize:13,color:t.text,background:t.input,border:`1px solid ${t.border}`,borderRadius:6,padding:"7px 10px"}}>📁 {fname}</div>}
        <div style={{fontSize:12,color:t.textFaint}}>Last saved: {getLastSave()}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          {authed
            ?<span style={{fontSize:13,color:t.driveOk,fontWeight:600}}>✓ Connected</span>
            :<Btn t={t} onClick={doAuth}>🔑 Connect Google Drive</Btn>
          }
          <Btn t={t} sec onClick={doPickFolder}>📁 Choose folder</Btn>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn t={t} onClick={()=>driveSave(false,setStatus,getData).then(()=>setLog("Saved at "+new Date().toLocaleString()))}>💾 Save now</Btn>
          <Btn t={t} sec onClick={doLoad}>⬇ Load from Drive</Btn>
        </div>
        {log&&<div style={{fontSize:12,color:t.textFaint,background:t.input,border:`1px solid ${t.border}`,borderRadius:6,padding:"8px 10px"}}>{log}</div>}
      </div>
    </Modal>
  );
}

          <div><label style={{fontSize:12,color:t.textFaint,display:"block",marginBottom:4}}>Name</label><Inp t={t} value={name} onChange={e=>setName(e.target.value)} placeholder="Character name…" autoFocus/></div>

// ── Writing Canvas ─────────────────────────────────────────────────────────
function WritingCanvas({t,scene,chars,canvasWidth,onWidthChange,onContentChange}){
  const [content,setContent]=useState(scene?.content||"");
  const [mention,setMention]=useState(null);
  const [mIdx,setMIdx]=useState(0);
  const [hovChar,setHovChar]=useState(null);
  const [hovPos,setHovPos]=useState(null);
  const tRef=useRef(),stimer=useRef();

  useEffect(()=>setContent(scene?.content||""),[scene?.id]);

  function onChange(e){
    const v=e.target.value;setContent(v);
    const bef=v.slice(0,e.target.selectionStart),m=bef.match(/@(\w*)$/);
    if(m){setMention({q:m[1].toLowerCase(),start:e.target.selectionStart-m[0].length});setMIdx(0);}else setMention(null);
    clearTimeout(stimer.current);stimer.current=setTimeout(()=>onContentChange(v),600);
  }
  const filtered=mention?chars.filter(c=>c.name.toLowerCase().includes(mention.q)):[];
  function insertM(ch){
    if(!mention||!tRef.current)return;
    const ins=content.slice(0,mention.start)+"@"+ch.name+content.slice(tRef.current.selectionStart);
    setContent(ins);setMention(null);onContentChange(ins);
    setTimeout(()=>{if(tRef.current){const p=mention.start+ch.name.length+1;tRef.current.selectionStart=p;tRef.current.selectionEnd=p;tRef.current.focus();}},0);
  }
  function onKD(e){
    if(!mention||!filtered.length)return;
    if(e.key==="ArrowDown"){e.preventDefault();setMIdx(i=>(i+1)%filtered.length);}
    if(e.key==="ArrowUp"){e.preventDefault();setMIdx(i=>(i-1+filtered.length)%filtered.length);}
    if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();insertM(filtered[mIdx]);}
    if(e.key==="Escape")setMention(null);
  }
  function renderHL(){
    const parts=[];const rx=/@([\w ]+)/g;let last=0,m;
    while((m=rx.exec(content))!==null){
      const ch=chars.find(c=>c.name.toLowerCase()===m[1].toLowerCase());
      if(ch){
        parts.push(<span key={last}>{content.slice(last,m.index)}</span>);
        parts.push(<span key={m.index} onMouseEnter={e=>{setHovChar(ch);setHovPos({x:e.clientX,y:e.clientY});}} onMouseLeave={()=>setHovChar(null)}
          style={{color:t.mention,background:t.mentionBg,borderRadius:3,padding:"0 2px",fontWeight:600,cursor:"pointer"}}>@{m[1]}</span>);
        last=m.index+m[0].length;
      }
    }
    parts.push(<span key="e">{content.slice(last)}</span>);return parts;
  }
  const wc=content.trim()?content.trim().split(/\s+/).length:0;
  const cw=Math.min(canvasWidth,window.innerWidth-32);
  if(!scene)return<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:t.textFaint,fontSize:15,fontStyle:"italic",flexDirection:"column",gap:12}}><span style={{fontSize:36}}>✦</span><span>Select a scene to begin writing</span></div>;
  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 16px 0",overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:900,display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
        <span style={{fontSize:12,color:t.textFaint,whiteSpace:"nowrap"}}>Width</span>
        <input type="range" min={300} max={900} value={canvasWidth} onChange={e=>onWidthChange(+e.target.value)} style={{flex:1,accentColor:t.accent}}/>
        <span style={{fontSize:12,color:t.textFaint,width:40}}>{canvasWidth}px</span>
      </div>
      <div style={{width:cw,position:"relative",marginBottom:12}}>
        <div style={{fontFamily:"Georgia,serif",fontSize:16,lineHeight:1.9,color:t.text,whiteSpace:"pre-wrap",wordBreak:"break-word",padding:"22px 26px",minHeight:380,pointerEvents:"none",position:"absolute",inset:0,zIndex:1}}>
          {renderHL()}<span style={{opacity:0}}>.</span>
        </div>
        <textarea ref={tRef} value={content} onChange={onChange} onKeyDown={onKD}
          onSelect={e=>{const bef=content.slice(0,e.target.selectionStart),m=bef.match(/@(\w*)$/);if(m){setMention({q:m[1].toLowerCase(),start:e.target.selectionStart-m[0].length});setMIdx(0);}else setMention(null);}}
          placeholder="Begin writing… type @name to link a character"
          style={{fontFamily:"Georgia,serif",fontSize:16,lineHeight:1.9,color:"transparent",caretColor:t.text,background:t.card,border:`1px solid ${t.border}`,borderRadius:10,padding:"22px 26px",width:"100%",boxSizing:"border-box",minHeight:380,resize:"vertical",outline:"none",position:"relative",zIndex:2}}/>
        {mention&&filtered.length>0&&(
          <div style={{position:"absolute",top:"100%",left:26,zIndex:300,background:t.panel,border:`1px solid ${t.border}`,borderRadius:8,boxShadow:`0 6px 24px ${t.cardShadow}`,minWidth:210,marginTop:4}}>
            {filtered.map((ch,i)=>(
              <div key={ch.id} onMouseDown={e=>{e.preventDefault();insertM(ch);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",cursor:"pointer",background:i===mIdx?t.sceneActive:"transparent",borderRadius:i===0?"8px 8px 0 0":i===filtered.length-1?"0 0 8px 8px":"0"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:t.border,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>
                  {ch.image?<img src={ch.image} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:"👤"}
                </div>
                <div><div style={{fontWeight:600,fontSize:13,color:t.text}}>{ch.name}</div><div style={{fontSize:11,color:t.textFaint}}>{ch.role}</div></div>
              </div>
            ))}
          </div>
        )}
      </div>
      <div style={{width:cw,display:"flex",justifyContent:"flex-end",marginBottom:16}}>
        <span style={{fontSize:12,color:t.textFaint}}>{wc.toLocaleString()} words</span>
      </div>
      {hovChar&&hovPos&&(
        <div style={{position:"fixed",left:hovPos.x+14,top:hovPos.y-8,zIndex:3000,background:t.panel,border:`1px solid ${t.border}`,borderRadius:10,padding:14,maxWidth:270,boxShadow:`0 6px 24px ${t.cardShadow}`,pointerEvents:"none"}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            {hovChar.image&&<img src={hovChar.image} alt="" style={{width:46,height:58,objectFit:"cover",borderRadius:6,flexShrink:0}}/>}
            <div>
              <div style={{fontWeight:700,fontSize:14,color:t.text}}>{hovChar.name}</div>
              <div style={{fontSize:11,color:t.accent,marginBottom:4}}>{hovChar.role}</div>
              {hovChar.summary&&<div style={{fontSize:12,color:t.textFaint,lineHeight:1.5}}>{hovChar.summary.slice(0,110)}{hovChar.summary.length>110?"…":""}</div>}
              {hovChar.traits&&<div style={{fontSize:11,color:t.textFaint,marginTop:4,fontStyle:"italic"}}>{hovChar.traits}</div>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Structure Panel ────────────────────────────────────────────────────────
function StructurePanel({t,stories,activeSceneId,onSelectScene,onUpdateTree}){
  const [exp,setExp]=useState({s1:true,ch1:true,ch2:true});
  const [editing,setEditing]=useState(null);
  function toggle(id){setExp(p=>({...p,[id]:!p[id]}));}
  function addChild(parent,type){
    const nn=type==="scene"?{id:uid(),title:"New scene",content:"",wordCount:0}:{id:uid(),title:type==="chapter"?"New chapter":"New story",children:[]};
    function ins(nodes){return nodes.map(n=>{if(n.id===parent.id)return{...n,children:[...(n.children||[]),nn]};if(n.children)return{...n,children:ins(n.children)};return n;});}
    onUpdateTree(ins(stories));setExp(p=>({...p,[parent.id]:true}));
  }
  function rename(id,title){
    function r(ns){return ns.map(n=>{if(n.id===id)return{...n,title};if(n.children)return{...n,children:r(n.children)};return n;});}
    onUpdateTree(r(stories));setEditing(null);
  }
  function del(id){
    function d(ns){return ns.filter(n=>n.id!==id).map(n=>n.children?{...n,children:d(n.children)}:n);}
    onUpdateTree(d(stories));
  }
  function node(n,depth=0){
    const isSc=!n.children,isAct=n.id===activeSceneId,isEx=exp[n.id];
    return(
      <div key={n.id}>
        <div onClick={()=>{if(isSc)onSelectScene(n);else toggle(n.id);}}
          style={{display:"flex",alignItems:"center",padding:`5px 8px 5px ${10+depth*14}px`,borderRadius:6,cursor:"pointer",background:isAct?t.sceneActive:"transparent",marginBottom:1,gap:4}}
          onMouseEnter={e=>{if(!isAct)e.currentTarget.style.background=t.sceneActive;}}
          onMouseLeave={e=>{if(!isAct)e.currentTarget.style.background="transparent";}}>
          <span style={{fontSize:10,color:t.textFaint,width:12,textAlign:"center",flexShrink:0}}>{isSc?"✦":isEx?"▾":"▸"}</span>
          {editing===n.id
            ?<input autoFocus defaultValue={n.title} style={{flex:1,background:t.input,border:`1px solid ${t.border}`,borderRadius:4,padding:"1px 5px",fontSize:13,color:t.text,fontFamily:"inherit"}}
                onBlur={e=>rename(n.id,e.target.value)} onKeyDown={e=>{if(e.key==="Enter")rename(n.id,e.target.value);if(e.key==="Escape")setEditing(null);}} onClick={e=>e.stopPropagation()}/>
            :<span style={{flex:1,fontSize:13,color:isAct?t.accent:t.text,fontWeight:isAct?700:depth===0?600:400,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{n.title}</span>
          }
          <span style={{display:"flex",gap:1,opacity:0}} onMouseEnter={e=>{e.currentTarget.style.opacity=1;e.stopPropagation();}} onMouseLeave={e=>e.currentTarget.style.opacity=0}>
            <button onClick={e=>{e.stopPropagation();setEditing(n.id);}} style={{...BS,background:"none",fontSize:11,color:t.textFaint,padding:"1px 3px"}}>✎</button>
            {!isSc&&<button onClick={e=>{e.stopPropagation();addChild(n,depth===0?"chapter":"scene");}} style={{...BS,background:"none",fontSize:11,color:t.textFaint,padding:"1px 3px"}}>+</button>}
            <button onClick={e=>{e.stopPropagation();del(n.id);}} style={{...BS,background:"none",fontSize:11,color:t.textFaint,padding:"1px 3px"}}>×</button>
          </span>
        </div>
        {!isSc&&isEx&&n.children&&n.children.map(c=>node(c,depth+1))}
      </div>
    );
  }
  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{padding:"10px 12px 6px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${t.border}`}}>
        <span style={{fontWeight:700,fontSize:13,color:t.text}}>Structure</span>
        <button onClick={()=>onUpdateTree([...stories,{id:uid(),title:"New story",children:[]}])} style={{...BS,background:t.accent,color:"#fff",borderRadius:5,padding:"3px 9px",fontSize:12,fontWeight:700}}>+ Story</button>
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"4px 4px 8px"}}>{stories.map(s=>node(s))}</div>
    </div>
  );
}

// ── Plot Board ─────────────────────────────────────────────────────────────
function PlotBoard({t,themeName,cols,cards,setCols,setCards}){
  const [drag,setDrag]=useState(null);
  const [drop,setDrop]=useState(null);
  const [editCard,setEditCard]=useState(null);
  const [editCol,setEditCol]=useState(null);
  const colors=CARD_COLS[themeName]||CARD_COLS.parchment;

  function colCards(id){return cards.filter(c=>c.colId===id).sort((a,b)=>a.order-b.order);}
  function saveCard(u){
    if(cards.find(c=>c.id===u.id))setCards(cards.map(c=>c.id===u.id?u:c));
    else{const cc=cards.filter(c=>c.colId===u.colId);setCards([...cards,{...u,id:uid(),order:cc.length?Math.max(...cc.map(c=>c.order))+1:0}]);}
    setEditCard(null);
  }
  function delCard(id){setCards(cards.filter(c=>c.id!==id));setEditCard(null);}
  function saveCol(u){
    if(cols.find(c=>c.id===u.id))setCols(cols.map(c=>c.id===u.id?u:c));else setCols([...cols,{...u,id:uid()}]);setEditCol(null);
  }
  function delCol(id){setCols(cols.filter(c=>c.id!==id));setCards(cards.filter(c=>c.colId!==id));setEditCol(null);}
  function onDrop(colId,afterId){
    if(!drag)return;
    const without=cards.filter(c=>c.id!==drag.id);
    const cc=without.filter(c=>c.colId===colId).sort((a,b)=>a.order-b.order);
    let idx=afterId?cc.findIndex(c=>c.id===afterId):cc.length;if(idx===-1)idx=cc.length;
    cc.splice(idx,0,{...drag,colId});
    setCards([...without.filter(c=>c.colId!==colId),...cc.map((c,i)=>({...c,order:i}))]);
    setDrag(null);setDrop(null);
  }

  function CardForm({card}){
    const [ti,setTi]=useState(card.title);const [bo,setBo]=useState(card.body);const [co,setCo]=useState(card.color||colors[0]);const [ci,setCi]=useState(card.colId);
    const s={background:t.input,border:`1px solid ${t.border}`,borderRadius:6,padding:"8px 10px",color:t.text,fontSize:14,width:"100%",boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
    return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <input style={s} placeholder="Title…" value={ti} onChange={e=>setTi(e.target.value)} autoFocus/>
      <textarea style={{...s,height:80,resize:"vertical"}} placeholder="Notes…" value={bo} onChange={e=>setBo(e.target.value)}/>
      <select style={s} value={ci} onChange={e=>setCi(e.target.value)}>{cols.map(c=><option key={c.id} value={c.id}>{c.title}</option>)}</select>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{colors.map(c=><div key={c} onClick={()=>setCo(c)} style={{width:22,height:22,borderRadius:5,background:c,cursor:"pointer",border:co===c?`2px solid ${t.accent}`:"2px solid transparent",boxSizing:"border-box"}}/>)}</div>
      <div style={{display:"flex",gap:8}}>
        <Btn t={t} onClick={()=>saveCard({...card,title:ti,body:bo,color:co,colId:ci})}>Save</Btn>
        {card.id&&<Btn t={t} sec onClick={()=>delCard(card.id)}>Delete</Btn>}
      </div>
    </div>);
  }
  function ColForm({col}){
    const [ti,setTi]=useState(col.title||"");
    const s={background:t.input,border:`1px solid ${t.border}`,borderRadius:6,padding:"8px 10px",color:t.text,fontSize:14,width:"100%",boxSizing:"border-box",outline:"none",fontFamily:"inherit"};
    return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <input style={s} placeholder="Column title…" value={ti} onChange={e=>setTi(e.target.value)} autoFocus/>
      <div style={{display:"flex",gap:8}}>
        <Btn t={t} onClick={()=>saveCol({...col,title:ti})}>Save</Btn>
        {col.id&&<Btn t={t} sec onClick={()=>delCol(col.id)}>Delete</Btn>}
      </div>
    </div>);
  }

  return(
    <div style={{flex:1,overflowX:"auto",overflowY:"hidden",padding:"16px 20px 0"}}>
      <div style={{display:"flex",gap:14,alignItems:"flex-start",minHeight:"100%",paddingBottom:20}}>
        {cols.map(col=>{
          const cc=colCards(col.id);
          return(<div key={col.id} style={{minWidth:220,maxWidth:255,width:238,display:"flex",flexDirection:"column",background:t.panel,borderRadius:10,border:`1px solid ${t.border}`,overflow:"hidden",flexShrink:0}}>
            <div style={{background:t.colHeader,padding:"10px 12px",display:"flex",alignItems:"center",borderBottom:`1px solid ${t.border}`,gap:6}}>
              <span style={{fontWeight:700,fontSize:13,color:t.colHeaderText,flex:1}}>{col.title}</span>
              <span style={{fontSize:11,color:t.textFaint}}>{cc.length}</span>
              <button onClick={()=>setEditCol(col)} style={{...BS,background:"none",color:t.textFaint,fontSize:13,padding:"0 2px"}}>✎</button>
            </div>
            <div onDragOver={e=>{e.preventDefault();setDrop({colId:col.id,afterId:"__e"});}} onDrop={e=>{e.preventDefault();onDrop(col.id,null);}} style={{flex:1,padding:"10px 10px 4px",minHeight:80}}>
              {cc.map(card=>(
                <div key={card.id} onDragOver={e=>{e.preventDefault();e.stopPropagation();setDrop({colId:col.id,afterId:card.id});}} onDrop={e=>{e.preventDefault();e.stopPropagation();onDrop(col.id,card.id);}}>
                  {drop?.colId===col.id&&drop?.afterId===card.id&&<div style={{height:4,background:t.accent,borderRadius:2,marginBottom:8,opacity:0.7}}/>}
                  <div draggable onDragStart={e=>{setDrag(card);e.dataTransfer.effectAllowed="move";}} onDragEnd={()=>{setDrag(null);setDrop(null);}} onClick={()=>setEditCard(card)}
                    style={{background:card.color,border:`1px solid ${t.border}`,borderRadius:8,padding:"10px 12px",marginBottom:8,cursor:"grab",opacity:drag?.id===card.id?0.4:1,userSelect:"none",boxShadow:`0 2px 6px ${t.cardShadow}`}}>
                    <div style={{fontWeight:700,fontSize:13,color:t.text,marginBottom:card.body?4:0}}>{card.title||<span style={{color:t.textFaint,fontStyle:"italic"}}>Untitled</span>}</div>
                    {card.body&&<div style={{fontSize:12,color:t.textFaint,lineHeight:1.5,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical"}}>{card.body}</div>}
                  </div>
                </div>
              ))}
              {drop?.colId===col.id&&drop?.afterId==="__e"&&<div style={{height:4,background:t.accent,borderRadius:2,marginBottom:8,opacity:0.7}}/>}
            </div>
            <button onClick={()=>setEditCard({id:null,colId:col.id,title:"",body:"",color:colors[0]})} style={{...BS,margin:"4px 10px 10px",background:"none",border:`1px dashed ${t.border}`,borderRadius:7,padding:"7px 0",color:t.textFaint,fontSize:13}}>+ Add card</button>
          </div>);
        })}
        <button onClick={()=>setEditCol({id:null,title:""})} style={{...BS,minWidth:190,height:80,background:"none",border:`2px dashed ${t.border}`,borderRadius:10,color:t.textFaint,fontSize:14,flexShrink:0,alignSelf:"flex-start"}}>+ Add column</button>
      </div>
      {editCard&&<Modal t={t} title={editCard.id?"Edit card":"New card"} onClose={()=>setEditCard(null)}><CardForm card={editCard}/></Modal>}
      {editCol&&<Modal t={t} title={editCol.id?"Edit column":"New column"} onClose={()=>setEditCol(null)}><ColForm col={editCol}/></Modal>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════
// ROOT
// ══════════════════════════════════════════════════════════════════════════
const VIEWS=["Write","Plot","Characters"];
function App(){
  const [themeIdx,setThemeIdx]=useState(()=>lsGet("scrf_theme",0));
  const [stories,setStories]=useState(()=>lsGet("scrf_stories",DEF_STORIES));
  const [chars,setChars]=useState(()=>lsGet("scrf_chars",DEF_CHARS));
  const [cols,setCols]=useState(()=>lsGet("scrf_cols",DEF_COLS));
  const [plotCards,setPlotCards]=useState(()=>lsGet("scrf_cards",DEF_CARDS));
  const [activeScene,setActiveScene]=useState(null);
  const [canvasWidth,setCanvasWidth]=useState(()=>lsGet("scrf_cw",660));
  const [view,setView]=useState("Write");
  const [editChar,setEditChar]=useState(null);
  const [sideOpen,setSideOpen]=useState(true);
  const [driveStatus,setDriveStatus]=useState("idle");
  const [showDrive,setShowDrive]=useState(false);

  const themeName=THEME_ORDER[themeIdx];
  const t=THEMES[themeName];
  const isMobile=window.innerWidth<640;

  useEffect(()=>lsSet("scrf_theme",themeIdx),[themeIdx]);
  useEffect(()=>lsSet("scrf_stories",stories),[stories]);
  useEffect(()=>lsSet("scrf_chars",chars),[chars]);
  useEffect(()=>lsSet("scrf_cols",cols),[cols]);
  useEffect(()=>lsSet("scrf_cards",plotCards),[plotCards]);
  useEffect(()=>lsSet("scrf_cw",canvasWidth),[canvasWidth]);

  function getAppData(){return{stories,chars,cols,plotCards,canvasWidth,themeIdx};}
  function setAppData(d){
    if(d.stories)setStories(d.stories);if(d.chars)setChars(d.chars);
    if(d.cols)setCols(d.cols);if(d.plotCards)setPlotCards(d.plotCards);
    if(d.canvasWidth)setCanvasWidth(d.canvasWidth);if(typeof d.themeIdx==="number")setThemeIdx(d.themeIdx);
  }
  const getDataRef=useRef(getAppData);
  useEffect(()=>{getDataRef.current=getAppData;},[stories,chars,cols,plotCards,canvasWidth,themeIdx]);

  function triggerAutoSave(){schedAutoSave(()=>getDataRef.current(),setDriveStatus);}

  function updateSceneContent(sceneId,content){
    const wc=content.trim()?content.trim().split(/\s+/).length:0;
    function upd(ns){return ns.map(n=>{if(n.id===sceneId)return{...n,content,wordCount:wc};if(n.children)return{...n,children:upd(n.children)};return n;});}
    setStories(s=>{const ns=upd(s);lsSet("scrf_stories",ns);return ns;});
    setActiveScene(s=>s?{...s,content,wordCount:wc}:s);
    triggerAutoSave();
  }
  function saveChar(u){if(chars.find(c=>c.id===u.id))setChars(chars.map(c=>c.id===u.id?u:c));else setChars([...chars,{...u,id:uid()}]);setEditChar(null);}
  function delChar(id){setChars(chars.filter(c=>c.id!==id));setEditChar(null);}

  return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",background:t.bg,color:t.text,transition:"background 0.2s"}}>
      {/* Header */}
      <div style={{background:t.header,padding:"0 12px",height:50,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:`2px solid ${t.accent}`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {view==="Write"&&<button onClick={()=>setSideOpen(o=>!o)} style={{...BS,background:"none",color:t.headerText,fontSize:18,padding:"0 4px"}}>☰</button>}
          <span style={{color:t.headerText,fontWeight:700,fontSize:isMobile?13:16,letterSpacing:"0.04em",marginRight:4}}>✦ Scriptorium</span>
          <div style={{display:"flex",gap:2}}>
            {VIEWS.map(v=><button key={v} onClick={()=>setView(v)} style={{...BS,background:view===v?t.accent:"transparent",color:view===v?"#fff":t.headerText+"99",borderRadius:6,padding:isMobile?"4px 7px":"4px 11px",fontSize:isMobile?11:13,fontWeight:view===v?700:400}}>{v}</button>)}
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <DriveBtn t={t} status={driveStatus} onClick={()=>setShowDrive(true)}/>
          <button onClick={()=>setThemeIdx(i=>(i+1)%THEME_ORDER.length)} style={{...BS,background:"none",border:`1px solid ${t.border}`,borderRadius:6,padding:"4px 9px",color:t.headerText,fontSize:12}}>{t.icon}{isMobile?"":" "+t.name}</button>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {view==="Write"&&(<>
          <div style={{width:sideOpen?(isMobile?"100%":215):0,flexShrink:0,borderRight:sideOpen?`1px solid ${t.border}`:"none",background:t.panel,overflowY:"auto",transition:"width 0.2s",position:isMobile?"absolute":"relative",zIndex:isMobile?100:1,height:isMobile?"calc(100vh - 50px)":"100%"}}>
            {sideOpen&&<StructurePanel t={t} stories={stories} activeSceneId={activeScene?.id}
              onSelectScene={s=>{setActiveScene(s);if(isMobile)setSideOpen(false);}}
              onUpdateTree={setStories}/>}
          </div>
          {(!isMobile||!sideOpen)&&<WritingCanvas t={t} scene={activeScene} chars={chars} canvasWidth={canvasWidth} onWidthChange={setCanvasWidth}
            onContentChange={c=>{if(activeScene)updateSceneContent(activeScene.id,c);}}/>}
        </>)}

        {view==="Plot"&&<PlotBoard t={t} themeName={themeName} cols={cols} cards={plotCards}
          setCols={c=>{setCols(c);triggerAutoSave();}} setCards={c=>{setPlotCards(c);triggerAutoSave();}}/>}

        {view==="Characters"&&(
          <div style={{flex:1,display:"flex",overflow:"hidden"}}>
            <div style={{width:isMobile?"100%":240,flexShrink:0,borderRight:isMobile?"none":`1px solid ${t.border}`,background:t.panel,overflowY:"auto"}}>
              <CharPanel t={t} chars={chars} onOpen={ch=>setEditChar(ch)} onNew={()=>setEditChar({id:null,name:"",role:"",summary:"",traits:"",image:null})}/>
            </div>
            {!isMobile&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",color:t.textFaint,fontSize:15,fontStyle:"italic",flexDirection:"column",gap:12}}>
              <span style={{fontSize:40}}>👤</span><span>Select a character or create a new one</span>
              <button onClick={()=>setEditChar({id:null,name:"",role:"",summary:"",traits:"",image:null})} style={{...BS,background:t.accent,color:"#fff",borderRadius:7,padding:"9px 20px",fontWeight:700,fontSize:14,marginTop:8}}>+ New character</button>
            </div>}
          </div>
        )}
      </div>

      {showDrive&&<DriveModal t={t} onClose={()=>setShowDrive(false)} setStatus={setDriveStatus} getData={()=>getDataRef.current()} setData={setAppData}/>}
      {editChar&&<CharBioModal t={t} char={editChar} onSave={saveChar} onDelete={delChar} onClose={()=>setEditChar(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
